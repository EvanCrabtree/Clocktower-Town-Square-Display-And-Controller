<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blood on the Clocktower Controller</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  
  body {
    font-family: 'Crimson Text', serif;
    background: linear-gradient(135deg, #0a0a0a 0%, #1a0f0f 50%, #0f0a1a 100%);
    color: #f0e6d2;
    min-height: 100vh;
    padding: 20px;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: 
      radial-gradient(circle at 20% 80%, rgba(139, 69, 19, 0.1) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(25, 25, 112, 0.1) 0%, transparent 50%),
      radial-gradient(circle at 40% 40%, rgba(178, 34, 34, 0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: -1;
  }
  
  .container {
    max-width: 1200px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: 3em;
    font-weight: 600;
    background: linear-gradient(135deg, #d4af37, #8b4513);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
    margin-bottom: 10px;
    letter-spacing: 3px;
  }

  .subtitle {
    font-size: 1.2em;
    color: #a08060;
    font-style: italic;
  }

  .controls-section {
    background: rgba(20, 20, 30, 0.8);
    border: 2px solid rgba(139, 69, 19, 0.3);
    border-radius: 20px;
    padding: 30px;
    margin-bottom: 30px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  }

  .phase-controls {
    display: flex;
    gap: 30px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .control-group label {
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: 1.1em;
    color: #d4af37;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  select, input[type="number"] {
    background: rgba(40, 40, 50, 0.8);
    border: 2px solid rgba(139, 69, 19, 0.4);
    border-radius: 10px;
    padding: 12px 20px;
    color: #f0e6d2;
    font-family: 'Crimson Text', serif;
    font-size: 1.1em;
    transition: all 0.3s ease;
  }

  select:focus, input[type="number"]:focus {
    outline: none;
    border-color: #d4af37;
    box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
  }

  select option {
    background: #1a0f0f;
    color: #f0e6d2;
  }

  .players-section {
    background: rgba(20, 20, 30, 0.8);
    border: 2px solid rgba(139, 69, 19, 0.3);
    border-radius: 20px;
    padding: 30px;
    margin-bottom: 30px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  }

  .section-title {
    font-family: 'Cinzel', serif;
    font-size: 1.8em;
    font-weight: 600;
    color: #d4af37;
    margin-bottom: 25px;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .players-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
  }

  .player-card {
    background: rgba(30, 30, 40, 0.8);
    border: 2px solid rgba(139, 69, 19, 0.4);
    border-radius: 15px;
    padding: 20px;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .player-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #d4af37, #8b4513);
  }

  .player-card.dead {
    background: rgba(40, 20, 20, 0.8);
    border-color: rgba(178, 34, 34, 0.4);
    opacity: 0.8;
  }

  .player-card.dead::before {
    background: linear-gradient(90deg, #dc143c, #8b0000);
  }

  .player-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 48px rgba(139, 69, 19, 0.2);
  }

  .order-controls {
    position: absolute;
    top: 10px;
    right: 10px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .order-btn {
    background: rgba(212, 175, 55, 0.2);
    border: 1px solid rgba(212, 175, 55, 0.4);
    border-radius: 5px;
    color: #d4af37;
    font-size: 1.2em;
    width: 30px;
    height: 25px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s ease;
    padding: 0;
  }

  .order-btn:hover {
    background: rgba(212, 175, 55, 0.3);
    border-color: #d4af37;
  }

  .order-btn:active {
    transform: scale(0.95);
  }

  .order-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .player-name {
    font-size: 1.4em;
    font-weight: 600;
    margin-bottom: 10px;
    color: #f0e6d2;
  }

  .player-status {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
    flex-wrap: wrap;
  }

  .status-badge {
    background: rgba(60, 60, 70, 0.8);
    border: 1px solid rgba(139, 69, 19, 0.3);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 0.9em;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .status-badge.alive {
    background: rgba(255, 165, 0, 0.2);
    border-color: rgba(255, 165, 0, 0.4);
    color: #ffa500;
  }

  .status-badge.dead {
    background: rgba(220, 20, 60, 0.2);
    border-color: rgba(220, 20, 60, 0.4);
    color: #dc143c;
  }

  .status-badge.traveler {
    background: rgba(65, 105, 225, 0.2);
    border-color: rgba(65, 105, 225, 0.4);
    color: #4169e1;
  }

  .status-badge.ghost {
    background: rgba(147, 112, 219, 0.2);
    border-color: rgba(147, 112, 219, 0.4);
    color: #9370db;
  }

  .player-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .btn {
    background: linear-gradient(135deg, rgba(139, 69, 19, 0.8), rgba(25, 25, 112, 0.8));
    border: 2px solid rgba(212, 175, 55, 0.3);
    border-radius: 10px;
    padding: 8px 16px;
    color: #f0e6d2;
    font-family: 'Crimson Text', serif;
    font-size: 0.9em;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3);
    border-color: #d4af37;
  }

  .btn:active {
    transform: translateY(0);
  }

  .btn.danger {
    background: linear-gradient(135deg, rgba(178, 34, 34, 0.8), rgba(139, 0, 0, 0.8));
    border-color: rgba(220, 20, 60, 0.4);
  }

  .btn.danger:hover {
    box-shadow: 0 4px 20px rgba(220, 20, 60, 0.3);
    border-color: #dc143c;
  }

  .add-player-section {
    background: rgba(20, 20, 30, 0.8);
    border: 2px solid rgba(139, 69, 19, 0.3);
    border-radius: 20px;
    padding: 30px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  }

  .bulk-import-section {
    background: rgba(25, 25, 35, 0.8);
    border: 2px solid rgba(139, 69, 19, 0.3);
    border-radius: 20px;
    padding: 30px;
    margin-bottom: 30px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  }

  .bulk-textarea {
    background: rgba(40, 40, 50, 0.8);
    border: 2px solid rgba(139, 69, 19, 0.4);
    border-radius: 10px;
    padding: 15px;
    color: #f0e6d2;
    font-family: 'Crimson Text', serif;
    font-size: 1.1em;
    transition: all 0.3s ease;
    width: 100%;
    min-height: 120px;
    resize: vertical;
  }

  .bulk-textarea:focus {
    outline: none;
    border-color: #d4af37;
    box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
  }

  .bulk-textarea::placeholder {
    color: #a08060;
    font-style: italic;
  }

  .bulk-buttons {
    display: flex;
    gap: 15px;
    margin-top: 15px;
    justify-content: center;
  }

  .add-player-form {
    display: flex;
    gap: 15px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }

  input[type="text"] {
    background: rgba(40, 40, 50, 0.8);
    border: 2px solid rgba(139, 69, 19, 0.4);
    border-radius: 10px;
    padding: 12px 20px;
    color: #f0e6d2;
    font-family: 'Crimson Text', serif;
    font-size: 1.1em;
    transition: all 0.3s ease;
    min-width: 250px;
  }

  input[type="text"]:focus {
    outline: none;
    border-color: #d4af37;
    box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
  }

  input[type="text"]::placeholder {
    color: #a08060;
    font-style: italic;
  }

  .btn-primary {
    background: linear-gradient(135deg, rgba(212, 175, 55, 0.8), rgba(139, 69, 19, 0.8));
    border: 2px solid rgba(212, 175, 55, 0.4);
    padding: 12px 30px;
    font-size: 1.1em;
  }

  .btn-primary:hover {
    box-shadow: 0 4px 20px rgba(212, 175, 55, 0.4);
    border-color: #d4af37;
  }

  .connection-status {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(20, 20, 30, 0.9);
    border: 2px solid rgba(139, 69, 19, 0.4);
    border-radius: 10px;
    padding: 10px 15px;
    font-size: 0.9em;
    z-index: 1000;
  }

  .connection-status.connected {
    border-color: rgba(34, 139, 34, 0.6);
    color: #90ee90;
  }

  .connection-status.disconnected {
    border-color: rgba(220, 20, 60, 0.6);
    color: #ff6b6b;
  }

  @media (max-width: 768px) {
    h1 {
      font-size: 2em;
    }
    
    .players-grid {
      grid-template-columns: 1fr;
    }
    
    .phase-controls {
      flex-direction: column;
      gap: 20px;
    }
    
    .add-player-form {
      flex-direction: column;
      width: 100%;
    }
    
    input[type="text"] {
      width: 100%;
      min-width: unset;
    }
  }
</style>
</head>
<body>
<div class="connection-status" id="connectionStatus">Connecting...</div>

<div class="container">
  <header>
    <h1>Storyteller's Grimoire</h1>
    <p class="subtitle">Blood on the Clocktower Controller</p>
  </header>

  <section class="controls-section">
    <section class="phase-controls">
      <h2 class="section-title">Time of Day</h2>
      <div class="phase-controls-row">
        <select id="phaseSelect">
          <option value="Night">Night</option>
          <option value="Day">Day</option>
        </select>
        <input type="number" id="phaseNumber" min="1" value="1">
        <button class="btn btn-primary" id="nextPhaseBtn">Next Time</button>
      </div>
    </section>

  </section>

  <section class="players-section">
    <h2 class="section-title">Players</h2>
    <div class="players-grid" id="playersContainer"></div>
  </section>

  <section class="bulk-import-section">
    <h2 class="section-title">Bulk Import Players</h2>
    <textarea class="bulk-textarea" id="bulkPlayerInput" placeholder="Enter player names, one per line or separated by commas:

John Doe
Jane Smith
Bob Johnson

Or:
John Doe, Jane Smith, Bob Johnson"></textarea>
    <div class="bulk-buttons">
      <button class="btn btn-primary" id="bulkImportBtn">Import Players</button>
      <button class="btn" id="clearBulkBtn">Clear</button>
    </div>
  </section>

  <section class="add-player-section">
    <h2 class="section-title">Add Single Player</h2>
    <div class="add-player-form">
      <input type="text" id="newPlayerName" placeholder="Enter player name...">
      <button class="btn btn-primary" id="addPlayerBtn">Add Player</button>
    </div>
  </section>
</div>

<script>
const playersContainer = document.getElementById("playersContainer");
const phaseSelect = document.getElementById("phaseSelect");
const phaseNumber = document.getElementById("phaseNumber");
const newPlayerName = document.getElementById("newPlayerName");
const addPlayerBtn = document.getElementById("addPlayerBtn");
const nextPhaseBtn = document.getElementById("nextPhaseBtn");
const connectionStatus = document.getElementById("connectionStatus");
const bulkPlayerInput = document.getElementById("bulkPlayerInput");
const bulkImportBtn = document.getElementById("bulkImportBtn");
const clearBulkBtn = document.getElementById("clearBulkBtn");

let players = [];

// Replace with your server IP
const ws = new WebSocket('ws://YOUR_IP:8080');

// Set initial game state to Night 1
phaseSelect.value = 'Night';
phaseNumber.value = '1';

function updateConnectionStatus(connected) {
  if (connected) {
    connectionStatus.textContent = 'Connected';
    connectionStatus.className = 'connection-status connected';
  } else {
    connectionStatus.textContent = 'Disconnected';
    connectionStatus.className = 'connection-status disconnected';
  }
}

ws.onopen = () => {
  console.log("WebSocket connected!");
  updateConnectionStatus(true);
};

ws.onerror = (err) => {
  console.error("WebSocket error:", err);
  updateConnectionStatus(false);
};

ws.onclose = () => {
  console.log("WebSocket closed.");
  updateConnectionStatus(false);
};

ws.onmessage = (msg) => {
  const data = JSON.parse(msg.data);
  if (data.players) players = data.players;
  if (data.phase) phaseSelect.value = data.phase;
  if (data.phaseNumber) phaseNumber.value = data.phaseNumber;
  
  renderPlayers();
};

function sendUpdate() {
  const data = {
    players,
    phase: phaseSelect.value,
    phaseNumber: Number(phaseNumber.value)
  };
  if (ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(data));
  }
  renderPlayers();
}



function renderPlayers() {
  playersContainer.innerHTML = "";
  players.forEach((p, index) => {
    const card = document.createElement("div");
    card.className = `player-card ${!p.alive ? 'dead' : ''}`;
    card.dataset.index = index;

    // Add order controls
    const orderControls = document.createElement("div");
    orderControls.className = "order-controls";
    
    const moveUpBtn = document.createElement("button");
    moveUpBtn.className = "order-btn";
    moveUpBtn.innerHTML = "↑";
    moveUpBtn.disabled = index === 0;
    moveUpBtn.onclick = (e) => { e.stopPropagation(); movePlayer(index, -1); };
    
    const moveDownBtn = document.createElement("button");
    moveDownBtn.className = "order-btn";
    moveDownBtn.innerHTML = "↓";
    moveDownBtn.disabled = index === players.length - 1;
    moveDownBtn.onclick = (e) => { e.stopPropagation(); movePlayer(index, 1); };
    
    orderControls.appendChild(moveUpBtn);
    orderControls.appendChild(moveDownBtn);
    card.appendChild(orderControls);

    const nameDiv = document.createElement("div");
    nameDiv.className = "player-name";
    nameDiv.textContent = p.name;

    const statusDiv = document.createElement("div");
    statusDiv.className = "player-status";
    
    const aliveBadge = document.createElement("div");
    aliveBadge.className = `status-badge ${p.alive ? 'alive' : 'dead'}`;
    aliveBadge.innerHTML = p.alive ? '🕯️ Alive' : '💀 Dead';
    statusDiv.appendChild(aliveBadge);
    
    if (p.traveler) {
      const travelerBadge = document.createElement("div");
      travelerBadge.className = "status-badge traveler";
      travelerBadge.innerHTML = '🎒 Traveler';
      statusDiv.appendChild(travelerBadge);
    }
    
    if (p.ghostVote && !p.alive) {
      const ghostBadge = document.createElement("div");
      ghostBadge.className = "status-badge ghost";
      ghostBadge.innerHTML = '👻 Ghost Vote';
      statusDiv.appendChild(ghostBadge);
    }

    const actionsDiv = document.createElement("div");
    actionsDiv.className = "player-actions";

    const aliveBtn = document.createElement("button");
    aliveBtn.className = "btn";
    aliveBtn.textContent = p.alive ? "Kill" : "Revive";
    aliveBtn.onclick = (e) => { e.stopPropagation(); killOrRevive(index); };
    actionsDiv.appendChild(aliveBtn);

    const travelerBtn = document.createElement("button");
    travelerBtn.className = "btn";
    travelerBtn.textContent = p.traveler ? "Unset Traveler" : "Set Traveler";
    travelerBtn.onclick = (e) => { e.stopPropagation(); p.traveler = !p.traveler; sendUpdate(); };
    actionsDiv.appendChild(travelerBtn);

    const ghostBtn = document.createElement("button");
    ghostBtn.className = "btn";
    ghostBtn.textContent = p.ghostVote ? "Remove Ghost" : "Add Ghost";
    ghostBtn.onclick = (e) => { e.stopPropagation(); p.ghostVote = !p.ghostVote; sendUpdate(); };
    actionsDiv.appendChild(ghostBtn);

    const deleteBtn = document.createElement("button");
    deleteBtn.className = "btn danger";
    deleteBtn.textContent = "Remove";
    deleteBtn.onclick = (e) => { e.stopPropagation(); players.splice(index, 1); sendUpdate(); };
    actionsDiv.appendChild(deleteBtn);

    card.appendChild(nameDiv);
    card.appendChild(statusDiv);
    card.appendChild(actionsDiv);
    
    playersContainer.appendChild(card);
  });
}

function killOrRevive(index) {
  const player = players[index];
  player.alive = !player.alive;
  sendUpdate();
}

function movePlayer(index, direction) {
  const newIndex = index + direction;
  
  // Check bounds
  if (newIndex < 0 || newIndex >= players.length) {
    return;
  }
  
  // Swap players
  const temp = players[index];
  players[index] = players[newIndex];
  players[newIndex] = temp;
  
  sendUpdate();
}

function nextPhase() {
  // Normal phase advancement
  if (phaseSelect.value === 'Night') {
    phaseSelect.value = 'Day';
  } else {
    phaseSelect.value = 'Night';
    phaseNumber.value = String(Number(phaseNumber.value) + 1);
  }
  sendUpdate();
}

// Initialize event listeners
phaseSelect.onchange = sendUpdate;
phaseNumber.onchange = sendUpdate;
nextPhaseBtn.onclick = nextPhase;

function bulkImportPlayers() {
  const input = bulkPlayerInput.value.trim();
  if (!input) return;
  
  // Split by newlines or commas
  const names = input.split(/[\n,]+/).map(name => name.trim()).filter(name => name);
  
  if (names.length === 0) return;
  
  // Add players
  names.forEach(name => {
    // Check if player already exists
    if (!players.find(p => p.name.toLowerCase() === name.toLowerCase())) {
      players.push({ name, alive: true, traveler: false, ghostVote: true });
    }
  });
  
  sendUpdate();
  bulkPlayerInput.value = "";
}

function clearBulkInput() {
  bulkPlayerInput.value = "";
}

addPlayerBtn.onclick = () => {
  const name = newPlayerName.value.trim();
  if (name) {
    players.push({ name, alive: true, traveler: false, ghostVote: true });
    sendUpdate();
    newPlayerName.value = "";
  }
};

bulkImportBtn.onclick = bulkImportPlayers;
clearBulkBtn.onclick = clearBulkInput;

nextPhaseBtn.onclick = nextPhase;

phaseSelect.addEventListener("change", sendUpdate);
phaseNumber.addEventListener("input", sendUpdate);

renderPlayers();
</script>
</body>
</html>
