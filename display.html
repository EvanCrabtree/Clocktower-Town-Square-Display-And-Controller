<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blood on the Clocktower - Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Crimson Text', serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a0f0f 50%, #0f0a1a 100%);
      color: #f0e6d2;
      overflow: hidden;
      height: 100vh;
      position: relative;
      transition: background 1s ease;
      margin: 0;
      padding: 0;
    }
  
  body {
    font-family: 'Crimson Text', serif;
    background: linear-gradient(135deg, #0a0a0a 0%, #1a0f0f 50%, #0f0a1a 100%);
    color: #f0e6d2;
    overflow: hidden;
    height: 100vh;
    position: relative;
    transition: background 1s ease;
    margin: 0;
    padding: 0;
  }

  body.day-theme {
    background: linear-gradient(135deg, #2a4a3a 0%, #3a5f4a 50%, #4a6f5a 100%);
  }

  body.night-theme {
    background: linear-gradient(135deg, #0a0a0a 0%, #1a0f0f 50%, #0f0a1a 100%);
  }

  body::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: 
      radial-gradient(circle at 20% 80%, rgba(139, 69, 19, 0.1) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(25, 25, 112, 0.1) 0%, transparent 50%),
      radial-gradient(circle at 40% 40%, rgba(178, 34, 34, 0.05) 0%, transparent 50%);
    pointer-events: none;
    transition: opacity 1s ease;
  }

  body.day-theme::before {
    background: 
      radial-gradient(circle at 30% 70%, rgba(255, 223, 0, 0.1) 0%, transparent 50%),
      radial-gradient(circle at 70% 30%, rgba(135, 206, 235, 0.1) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.05) 0%, transparent 50%);
  }
  
  #playersContainer {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  
  .player-card {
    position: absolute;
    text-align: center;
    transform: translate(-50%, -50%);
    font-size: clamp(0.8em, 1.3vw, 1.0em);
    white-space: nowrap;
    background: rgba(20, 20, 30, 0.9);
    border: 2px solid rgba(139, 69, 19, 0.4);
    border-radius: 12px;
    padding: clamp(4px, 1vw, 6px);
    box-shadow: 
      0 8px 32px rgba(0, 0, 0, 0.3),
      inset 0 1px 0 rgba(255, 255, 255, 0.1);
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
    overflow: hidden;
    width: clamp(120px, 10vw, 160px);
    min-width: 120px;
    max-width: 160px;
  }

  body.day-theme .player-card {
    background: rgba(40, 60, 40, 0.8);
    border-color: rgba(76, 175, 80, 0.4);
    box-shadow: 
      0 8px 32px rgba(0, 0, 0, 0.2),
      inset 0 1px 0 rgba(255, 255, 255, 0.2);
  }

  body.day-theme .player-card.dead {
    background: rgba(80, 40, 40, 0.7);
    border-color: rgba(220, 20, 60, 0.5);
    box-shadow: 
      0 8px 32px rgba(139, 0, 0, 0.2),
      inset 0 1px 0 rgba(255, 100, 100, 0.1);
    opacity: 0.7;
  }

  body.day-theme .player-card.alive {
    border-color: rgba(76, 175, 80, 0.6);
    box-shadow: 
      0 8px 32px rgba(0, 0, 0, 0.2),
      0 0 15px rgba(76, 175, 80, 0.3),
      inset 0 1px 0 rgba(255, 255, 255, 0.3);
  }

  body.night-theme .player-card {
    background: rgba(20, 20, 30, 0.8);
    border-color: rgba(139, 69, 19, 0.4);
    box-shadow: 
      0 8px 32px rgba(0, 0, 0, 0.3),
      inset 0 1px 0 rgba(255, 255, 255, 0.1);
  }

  .player-card.dead {
    background: rgba(40, 20, 20, 0.8);
    border-color: rgba(178, 34, 34, 0.4);
    opacity: 0.7;
  }

  body.night-theme .player-card.dead {
    background: rgba(60, 20, 20, 0.7);
    border-color: rgba(220, 20, 60, 0.6);
    box-shadow: 
      0 8px 32px rgba(139, 0, 0, 0.3),
      inset 0 1px 0 rgba(255, 100, 100, 0.1);
    opacity: 0.6;
  }

  body.night-theme .player-card.alive {
    border-color: rgba(100, 200, 100, 0.5);
    box-shadow: 
      0 8px 32px rgba(0, 0, 0, 0.3),
      0 0 15px rgba(100, 200, 100, 0.2),
      inset 0 1px 0 rgba(255, 255, 255, 0.1);
  }


  .player-name {
    font-weight: 600;
    font-size: 1.1em;
    margin-bottom: 5px;
    color: #f0e6d2;
  }

  .player-status {
    font-size: 0.9em;
    display: flex;
    justify-content: center;
    gap: 8px;
    align-items: center;
  }

  .status-icon {
    font-size: 1.2em;
    filter: drop-shadow(0 0 4px currentColor);
  }
  
  #phaseDisplay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Cinzel', serif;
    font-size: clamp(2.5em, 4vw, 3.5em);
    font-weight: 600;
    color: #d4af37;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
    letter-spacing: 2px;
    animation: glow 2s ease-in-out infinite alternate;
    z-index: 10;
    transition: all 1s ease;
    pointer-events: none;
    background: rgba(20, 20, 30, 0.9);
    padding: clamp(8px, 1.5vw, 10px) clamp(15px, 2.5vw, 20px);
    border-radius: 15px;
    border: 2px solid rgba(139, 69, 19, 0.4);
    box-shadow: 
      0 8px 32px rgba(0, 0, 0, 0.3),
      inset 0 1px 0 rgba(255, 255, 255, 0.1);
    text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
  }

  body.day-theme #phaseDisplay {
    background: linear-gradient(135deg, rgba(255, 193, 7, 0.9), rgba(255, 152, 0, 0.9));
    border-color: rgba(255, 235, 59, 0.4);
    box-shadow: 
      0 10px 40px rgba(255, 193, 7, 0.3),
      inset 0 2px 0 rgba(255, 255, 255, 0.3);
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6);
  }

  body.night-theme #phaseDisplay {
    background: linear-gradient(135deg, rgba(139, 69, 19, 0.9), rgba(25, 25, 112, 0.9));
    border-color: rgba(212, 175, 55, 0.3);
    box-shadow: 
      0 10px 40px rgba(0, 0, 0, 0.5),
      inset 0 2px 0 rgba(255, 255, 255, 0.2);
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
  }

  #playerStats {
    position: absolute;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.6);
    border: 2px solid rgba(139, 69, 19, 0.3);
    border-radius: 12px;
    padding: 15px 25px;
    font-family: 'Cinzel', serif;
    font-size: clamp(0.9em, 1.5vw, 1.1em);
    font-weight: 600;
    text-align: center;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    z-index: 5;
  }

  #iconKey {
    position: absolute;
    bottom: clamp(10px, 2vw, 20px);
    left: clamp(10px, 2vw, 20px);
    font-family: 'Crimson Text', serif;
    font-size: clamp(0.7em, 1.2vw, 0.8em);
    background: rgba(20, 20, 30, 0.9);
    padding: clamp(6px, 1vw, 8px) clamp(10px, 1.5vw, 12px);
    border-radius: 10px;
    border: 1px solid rgba(139, 69, 19, 0.4);
    box-shadow: 
      0 4px 16px rgba(0, 0, 0, 0.3),
      inset 0 1px 0 rgba(255, 255, 255, 0.1);
    z-index: 10;
  }

  #distributionInfo {
    position: absolute;
    bottom: clamp(10px, 2vw, 20px);
    right: clamp(10px, 2vw, 20px);
    font-family: 'Crimson Text', serif;
    font-size: clamp(0.7em, 1.2vw, 0.8em);
    background: rgba(20, 20, 30, 0.9);
    padding: clamp(6px, 1vw, 8px) clamp(10px, 1.5vw, 12px);
    border-radius: 10px;
    border: 1px solid rgba(139, 69, 19, 0.4);
    box-shadow: 
      0 4px 16px rgba(0, 0, 0, 0.3),
      inset 0 1px 0 rgba(255, 255, 255, 0.1);
    z-index: 10;
  }

  .distribution-title {
    font-family: 'Cinzel', serif;
    font-size: 1.1em;
    color: #d4af37;
    margin-bottom: 8px;
    text-align: center;
  }

  .distribution-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 4px 0;
    color: #f0e6d2;
  }

  .distribution-role {
    font-weight: 500;
  }

  .distribution-count {
    font-weight: 600;
    min-width: 20px;
    text-align: right;
  }

  .distribution-role.townsfolk {
    color: #0055ff;
  }

  .distribution-role.outsiders {
    color: #0055ff;
  }

  .distribution-role.minions {
    color: #cc0000;
  }

  .distribution-role.demon {
    color: #cc0000;
  }

  .distribution-role.travelers {
    color: #9370db;
  }

  .icon-key-title {
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: 0.9em;
    color: #d4af37;
    margin-bottom: 5px;
    text-align: center;
  }

  .icon-key-item {
    display: flex;
    align-items: center;
    gap: 5px;
    margin: 2px 0;
    color: #f0e6d2;
  }

  .icon-key-icon {
    font-size: 1em;
    filter: drop-shadow(0 0 2px currentColor);
  }


  .stat-line {
    margin: 5px 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
  }

  .stat-total {
    color: #d4af37;
    font-size: 1.2em;
  }

  .stat-alive {
    color: #90ee90;
  }

  .stat-dead {
    color: #ff6b6b;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.8);
    }
    to {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
  }

  @keyframes glow {
    from {
      box-shadow: 
        0 10px 40px rgba(0, 0, 0, 0.5),
        inset 0 2px 0 rgba(255, 255, 255, 0.2),
        0 0 20px rgba(212, 175, 55, 0.2);
    }
    to {
      box-shadow: 
        0 10px 40px rgba(0, 0, 0, 0.5),
        inset 0 2px 0 rgba(255, 255, 255, 0.3),
        0 0 30px rgba(212, 175, 55, 0.4);
    }
  }

  .connecting {
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>
<div id="phaseDisplay" class="connecting">Connecting...</div>
<div id="playerStats">
  <div class="stat-line stat-total">Total: <span id="totalPlayers">0</span></div>
  <div class="stat-line">
    <span class="stat-alive">🕯️ <span id="alivePlayers">0</span></span>
    <span class="stat-dead">💀 <span id="deadPlayers">0</span></span>
  </div>
</div>
<div id="iconKey">
  <div class="icon-key-title">Legend</div>
  <div class="icon-key-item">
    <span class="icon-key-icon" style="color: #ffa500;">🕯️</span>
    <span>Alive Player</span>
  </div>
  <div class="icon-key-item">
    <span class="icon-key-icon" style="color: #dc143c;">💀</span>
    <span>Dead Player</span>
  </div>
  <div class="icon-key-item">
    <span class="icon-key-icon" style="color: #4169e1;">🎒</span>
    <span>Traveler</span>
  </div>
  <div class="icon-key-item">
    <span class="icon-key-icon" style="color: #9370db;">👻</span>
    <span>Ghost Vote</span>
  </div>
</div>
<div id="distributionInfo">
  <div class="distribution-title">Distribution</div>
  <div class="distribution-item">
    <span class="distribution-role townsfolk">Townsfolk:</span>
    <span class="distribution-count" id="townsfolkCount">0</span>
  </div>
  <div class="distribution-item">
    <span class="distribution-role outsiders">Outsiders:</span>
    <span class="distribution-count" id="outsidersCount">0</span>
  </div>
  <div class="distribution-item">
    <span class="distribution-role minions">Minions:</span>
    <span class="distribution-count" id="minionsCount">0</span>
  </div>
  <div class="distribution-item">
    <span class="distribution-role demon">Demon:</span>
    <span class="distribution-count" id="demonCount">0</span>
  </div>
  <div class="distribution-item">
    <span class="distribution-role travelers">Travelers:</span>
    <span class="distribution-count" id="travelersCount">0</span>
  </div>
</div>
<div id="playersContainer"></div>

<script>
const playersContainer = document.getElementById("playersContainer");
const phaseDisplay = document.getElementById("phaseDisplay");

// Replace with your server IP
const ws = new WebSocket('ws://YOUR_IP:8080');

let players = [];
let phase = "Night";
let phaseNumber = 1;

ws.onopen = () => {
  console.log("WebSocket connected!");
  phaseDisplay.classList.remove("connecting");
};
ws.onerror = (err) => console.error("WebSocket error:", err);
ws.onclose = () => console.log("WebSocket closed.");

ws.onmessage = (msg) => {
  const data = JSON.parse(msg.data);
  players = data.players || [];
  phase = data.phase || phase;
  phaseNumber = data.phaseNumber || phaseNumber;
  
  render();
};

function render() {
  phaseDisplay.textContent = `${phase} ${phaseNumber}`;
  playersContainer.innerHTML = "";

  // Update theme based on phase
  document.body.className = phase.toLowerCase() === 'day' ? 'day-theme' : 'night-theme';


  // Calculate player statistics
  const totalPlayers = players.length;
  const alivePlayers = players.filter(p => p.alive).length;
  const deadPlayers = totalPlayers - alivePlayers;
  
  // Update statistics display
  document.getElementById('totalPlayers').textContent = totalPlayers;
  document.getElementById('alivePlayers').textContent = alivePlayers;
  document.getElementById('deadPlayers').textContent = deadPlayers;
  
  // Update distribution information
  updateDistributionInfo();

  // Calculate oval layout for up to 20 players
  const containerWidth = playersContainer.clientWidth;
  const containerHeight = playersContainer.clientHeight;
  const vw = containerWidth / 100;
  const safeMargin = Math.max(60, Math.min(8 * vw, 80)); // Safe margin from edges
  const maxRadiusX = (containerWidth - safeMargin * 2) / 2.2;
  const maxRadiusY = (containerHeight - safeMargin * 2) / 2.0; // Extend to bottom with margins
  const centerX = containerWidth / 2;
  const centerY = containerHeight * 0.5; // Center vertically for full coverage
  const total = players.length;

  // Adjust oval radii based on number of players to fit up to 20
  let radiusX, radiusY;
  if (total <= 8) {
    radiusX = maxRadiusX * 0.5;
    radiusY = maxRadiusY * 0.5;
  } else if (total <= 12) {
    radiusX = maxRadiusX * 0.7;
    radiusY = maxRadiusY * 0.7;
  } else if (total <= 16) {
    radiusX = maxRadiusX * 0.85;
    radiusY = maxRadiusY * 0.85;
  } else {
    radiusX = maxRadiusX;
    radiusY = maxRadiusY;
  }

  players.forEach((p, i) => {
    const angle = (i / total) * 2 * Math.PI - Math.PI / 2; // Start from top
    const x = centerX + radiusX * Math.cos(angle);
    const y = centerY + radiusY * Math.sin(angle);

    const div = document.createElement("div");
    div.className = `player-card ${!p.alive ? 'dead' : ''} ${p.alive ? 'alive' : ''}`;
    
    div.style.left = `${x}px`;
    div.style.top = `${y}px`;

    const nameDiv = document.createElement("div");
    nameDiv.className = "player-name";
    nameDiv.textContent = p.name;

    const statusDiv = document.createElement("div");
    statusDiv.className = "player-status";
    
    if (p.alive) {
      const candle = document.createElement("span");
      candle.className = "status-icon";
      candle.textContent = "🕯️";
      candle.style.color = "#ffa500";
      statusDiv.appendChild(candle);
    } else {
      const skull = document.createElement("span");
      skull.className = "status-icon";
      skull.textContent = "💀";
      skull.style.color = "#dc143c";
      statusDiv.appendChild(skull);
    }
    
    if (p.traveler) {
      const traveler = document.createElement("span");
      traveler.className = "status-icon";
      traveler.textContent = "🎒";
      traveler.style.color = "#4169e1";
      statusDiv.appendChild(traveler);
    }
    
    if (p.ghostVote && !p.alive) {
      const ghost = document.createElement("span");
      ghost.className = "status-icon";
      ghost.textContent = "👻";
      ghost.style.color = "#9370db";
      statusDiv.appendChild(ghost);
    }

    div.appendChild(nameDiv);
    div.appendChild(statusDiv);
    playersContainer.appendChild(div);
  });
}

function updateDistributionInfo() {
  // Count non-traveler players
  const nonTravelers = players.filter(p => !p.traveler);
  const playerCount = nonTravelers.length;
  const travelers = players.filter(p => p.traveler).length;
  
  // Official Blood on the Clocktower distribution table
  let townsfolk = 0, outsiders = 0, minions = 0, demons = 0;
  
  if (playerCount >= 5 && playerCount <= 5) {
    townsfolk = 3; outsiders = 0; minions = 1; demons = 1;
  } else if (playerCount === 6) {
    townsfolk = 3; outsiders = 1; minions = 1; demons = 1;
  } else if (playerCount === 7) {
    townsfolk = 5; outsiders = 0; minions = 1; demons = 1;
  } else if (playerCount === 8) {
    townsfolk = 5; outsiders = 1; minions = 1; demons = 1;
  } else if (playerCount === 9) {
    townsfolk = 5; outsiders = 2; minions = 1; demons = 1;
  } else if (playerCount === 10) {
    townsfolk = 7; outsiders = 0; minions = 2; demons = 1;
  } else if (playerCount === 11) {
    townsfolk = 7; outsiders = 1; minions = 2; demons = 1;
  } else if (playerCount === 12) {
    townsfolk = 7; outsiders = 2; minions = 2; demons = 1;
  } else if (playerCount === 13) {
    townsfolk = 9; outsiders = 0; minions = 3; demons = 1;
  } else if (playerCount === 14) {
    townsfolk = 9; outsiders = 1; minions = 3; demons = 1;
  } else if (playerCount >= 15) {
    townsfolk = 9; outsiders = 2; minions = 3; demons = 1;
  }
  
  // Update display elements
  document.getElementById('townsfolkCount').textContent = townsfolk;
  document.getElementById('outsidersCount').textContent = outsiders;
  document.getElementById('minionsCount').textContent = minions;
  document.getElementById('demonCount').textContent = demons;
  document.getElementById('travelersCount').textContent = travelers;
}

</script>
</body>
</html>
